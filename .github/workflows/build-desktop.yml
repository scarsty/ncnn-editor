name: Build Desktop (Linux)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 curl zip unzip tar pkg-config

      - name: Clone and bootstrap vcpkg
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      # Cache the built vcpkg packages so onnx+protobuf are not rebuilt every run.
      # Key includes vcpkg.json hash; invalidate by bumping the suffix number.
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-linux-x64-${{ hashFiles('vcpkg.json') }}-1
          restore-keys: |
            vcpkg-linux-x64-${{ hashFiles('vcpkg.json') }}
            vcpkg-linux-x64-

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DNETEDIT_LOADER_TNN=ON \
            -DNETEDIT_LOADER_MNN=ON \
            -DNETEDIT_LOADER_ONNX=ON \
            -DNETEDIT_LOADER_NCNN=ON \
            -DNETEDIT_LOADER_YAML_YOLO=OFF

      - name: Build
        run: cmake --build build -j 4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nn-editor-linux
          path: build/nn-editor
